# Platform Governance Blueprint
# Purpose: Establishing multi-tenant guardrails and resource limits for the ecosystem.

apiVersion: v1
kind: Namespace
metadata:
  name: production-ecosystem
  labels:
    tier: enterprise
    compliance: nist-ai-rmf
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-resources
  namespace: production-ecosystem
spec:
  hard:
    requests.cpu: "20"
    requests.memory: 100Gi
    limits.cpu: "40"
    limits.memory: 200Gi
    pods: "50"
    services: "10"
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: production-ecosystem
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
